<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>请假管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #f5f7fa;
            color: #333;
        }
        /* 面包屑导航 */
        .breadcrumb {
            background-color: #eef2ff;
            padding: 15px 20px;
            font-size: 18px;
            color: #666;
        }
        .breadcrumb a {
            color: #4096ff;
            text-decoration: none;
        }
        .breadcrumb span {
            margin: 0 8px;
            color: #999;
        }
        /* 页面主体 */
        .container {
            background-color: #fff;
            margin: 10px;
            border-radius: 8px;
            overflow: hidden;
        }
        /* 用户信息栏 */
        .user-bar {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #eee;
        }
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .avatar img {
            width: 40px;
            opacity: 0.6;
        }
        .gender-icon {
            color: #4096ff;
            font-size: 24px;
        }
        /* 请假信息模块 */
        .leave-info {
            padding: 25px 20px;
            position: relative;
        }
        .leave-info .title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .leave-info .title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background-color: #4096ff;
            margin-right: 10px;
        }
        .pass-stamp {
            position: absolute;
            top: 25px;
            right: 20px;
            width: 100px;
            height: 100px;
            opacity: 0.7;
            /* 顺时针旋转15度 */
            transform: rotate(15deg);
        }
        .pass-stamp img {
            width: 100%;
        }
        .info-item {
            display: flex;
            font-size: 20px;
            margin-bottom: 18px;
            line-height: 1.6;
        }
        .info-label {
            color: #666;
            width: 140px;
            flex-shrink: 0;
        }
        .info-value {
            color: #333;
        }
        .info-value.blue {
            color: #4096ff;
            font-weight: 500;
            cursor: pointer;
            text-decoration: underline;
        }
        /* 编辑控件样式 */
        .info-value input,
        .info-value select,
        .info-value textarea,
        .progress-header input,
        .progress-user input {
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 16px;
            width: 100%;
            outline: none;
        }
        .info-value textarea {
            resize: vertical;
            min-height: 60px;
        }
        /* 时间选择器专用样式 */
        input[type="datetime-local"] {
            padding: 3px 6px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 280px;
        }
        /* 操作按钮 */
        .edit-btn-group {
            margin-top: 30px;
            display: none;
            gap: 15px;
        }
        .edit-btn-group.show {
            display: flex;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-save {
            background-color: #4096ff;
            color: #fff;
        }
        .btn-cancel {
            background-color: #eee;
            color: #333;
        }
        /* 办理进度模块 */
        .progress-section {
            padding: 25px 20px;
            border-top: 10px solid #f5f7fa;
        }
        .progress-section .title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .progress-section .title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background-color: #4096ff;
            margin-right: 10px;
        }
        .progress-list {
            list-style: none;
            position: relative;
            padding-left: 35px;
        }
        .progress-list::before {
            content: '';
            position: absolute;
            left: 12px;
            top: 10px;
            bottom: 10px;
            width: 2px;
            background-color: #91bfff;
        }
        .progress-item {
            position: relative;
            margin-bottom: 30px;
        }
        .progress-item:last-child {
            margin-bottom: 0;
        }
        .progress-dot {
            position: absolute;
            left: -35px;
            top: 2px;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background-color: #fff;
            border: 2px solid #4096ff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }
        .progress-dot.finished::after {
            content: '✓';
            color: #4096ff;
            font-size: 16px;
            font-weight: bold;
        }
        .progress-dot.pending {
            background-color: #fff;
            border: 2px solid #4096ff;
        }
        .progress-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 20px;
            margin-bottom: 8px;
        }
        .progress-status {
            margin-left: 8px;
            margin-right: 8px;
        }
        .progress-status.applying {
            color: #36d399;
        }
        .progress-status.passed {
            color: #36d399;
        }
        .progress-time {
            color: #999;
            font-size: 18px;
        }
        .progress-user {
            color: #666;
            font-size: 18px;
            margin-left: 2px;
        }
    </style>
</head>
<body>
    <!-- 面包屑导航 -->
    <div class="breadcrumb">
        <a href="#">首页</a>
        <span>></span>
        <a href="#">请假管理</a>
        <span>></span>
        <span>请假管理</span>
    </div>

    <div class="container">
        <!-- 用户信息栏 -->
        <div class="user-bar">
            <div class="avatar">
                <svg viewBox="0 0 24 24" fill="#ccc" width="40" height="40">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                </svg>
            </div>
            <span class="gender-icon">♂</span>
        </div>

        <!-- 请假信息模块 -->
        <div class="leave-info">
            <div class="title">请假信息</div>
            <div class="pass-stamp">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#8dd3bb" stroke-width="2"/>
                    <circle cx="50" cy="50" r="40" fill="none" stroke="#8dd3bb" stroke-width="1"/>
                    <rect x="20" y="35" width="60" height="30" rx="4" fill="#8dd3bb" opacity="0.2"/>
                    <text x="50" y="55" text-anchor="middle" fill="#3fb984" font-size="16" font-weight="bold">已通过</text>
                </svg>
            </div>

            <div class="info-item">
                <span class="info-label">请假类型：</span>
                <span class="info-value" data-edit>事假</span>
            </div>
            <div class="info-item">
                <span class="info-label">请假去向：</span>
                <span class="info-value" data-edit></span>
            </div>
            <div class="info-item">
                <span class="info-label">详细地址：</span>
                <span class="info-value" data-edit></span>
            </div>
            <div class="info-item">
                <span class="info-label">开始时间：</span>
                <span class="info-value" data-time data-edit>2026-04-18 08:00:00</span>
            </div>
            <div class="info-item">
                <span class="info-label">结束时间：</span>
                <span class="info-value" data-time data-edit>2026-04-18 21:30:00</span>
            </div>
            <div class="info-item">
                <span class="info-label">统计时长：</span>
                <span class="info-value" data-edit>天小时分钟</span>
            </div>
            <div class="info-item">
                <span class="info-label">紧急联系人：</span>
                <span class="info-value" data-edit></span>
            </div>
            <div class="info-item">
                <span class="info-label">紧急联系人电话：</span>
                <span class="info-value" data-edit></span>
            </div>
            <div class="info-item">
                <span class="info-label">请假理由：</span>
                <span class="info-value" data-edit>申请周末日常外出</span>
            </div>
            <div class="info-item">
                <span class="info-label">请假状态：</span>
                <span class="info-value blue" id="statusText">审核通过</span>
            </div>
            <div class="info-item">
                <span class="info-label">销假状态：</span>
                <span class="info-value" data-edit></span>
            </div>
            <div class="info-item">
                <span class="info-label">请假附件：</span>
                <span class="info-value" data-edit></span>
            </div>

            <!-- 编辑操作按钮 -->
            <div class="edit-btn-group">
                <button class="btn btn-save" id="saveBtn">保存修改</button>
                <button class="btn btn-cancel" id="cancelBtn">取消编辑</button>
            </div>
        </div>

        <!-- 办理进度模块 -->
        <div class="progress-section">
            <div class="title">办理进度</div>
            <ul class="progress-list">
                <li class="progress-item">
                    <div class="progress-dot finished"></div>
                    <div class="progress-header">
                        <span>申请 <span class="progress-status applying">申请</span></span>
                        <span class="progress-time" data-progress-time>2026-04-17 16:39</span>
                    </div>
                    <div class="progress-user" data-progress-user>陈卓禧</div>
                </li>
                <li class="progress-item">
                    <div class="progress-dot finished"></div>
                    <div class="progress-header">
                        <span>辅导员审核 <span class="progress-status passed">审核通过</span></span>
                        <span class="progress-time" data-progress-time>2026-04-17 17:02</span>
                    </div>
                    <div class="progress-user" data-progress-user>许雯</div>
                </li>
                <li class="progress-item">
                    <div class="progress-dot pending"></div>
                    <div class="progress-header">
                        <span>结束</span>
                        <span class="progress-time" data-progress-time></span>
                    </div>
                    <div class="progress-user" data-progress-user></div>
                </li>
            </ul>
        </div>
    </div>

    <script>
        // 全局变量
        let isEditMode = false;
        let originData = [];
        let originProgress = [];

        // 触发编辑：点击【审核通过】
        document.getElementById('statusText').addEventListener('click', function(){
            if(!isEditMode){
                openEditMode();
            }
        });

        // 时间格式化
        function formatTimeForPicker(timeStr) {
            if (!timeStr) return '';
            return timeStr.replace(' ', 'T').substring(0, 16);
        }
        function formatTimeForShow(timeStr) {
            if (!timeStr) return '';
            return timeStr.replace('T', ' ') + ':00';
        }

        // 开启编辑模式
        function openEditMode(){
            isEditMode = true;
            document.querySelector('.edit-btn-group').classList.add('show');
            
            // 1. 备份并编辑请假信息
            const editNodes = document.querySelectorAll('[data-edit]');
            originData = [];
            editNodes.forEach(item => {
                originData.push(item.innerText.trim());
                const text = item.innerText.trim();
                if (item.hasAttribute('data-time')) {
                    const pickerValue = formatTimeForPicker(text);
                    item.innerHTML = `<input type="datetime-local" value="${pickerValue}">`;
                } else {
                    item.innerHTML = `<input type="text" value="${text}">`;
                }
            });

            // 状态下拉框
            document.getElementById('statusText').innerHTML = `
                <select>
                    <option selected>审核通过</option>
                    <option>审核中</option>
                    <option>驳回</option>
                    <option>待审批</option>
                </select>
            `;

            // 2. 备份并编辑办理进度（时间→时间选择器）
            const progressTimes = document.querySelectorAll('[data-progress-time]');
            const progressUsers = document.querySelectorAll('[data-progress-user]');
            originProgress = [];

            progressTimes.forEach((el) => {
                originProgress.push(el.innerText.trim());
                const timeVal = formatTimeForPicker(el.innerText.trim());
                el.innerHTML = `<input type="datetime-local" value="${timeVal}">`;
            });
            progressUsers.forEach((el) => {
                originProgress.push(el.innerText.trim());
                el.innerHTML = `<input type="text" value="${el.innerText.trim()}">`;
            });
        }

        // 保存修改
        document.getElementById('saveBtn').addEventListener('click', function(){
            // 保存请假信息
            const editNodes = document.querySelectorAll('[data-edit]');
            editNodes.forEach(item => {
                const input = item.querySelector('input');
                let val = input.value;
                if (item.hasAttribute('data-time')) {
                    val = formatTimeForShow(val);
                }
                item.innerText = val;
            });
            document.getElementById('statusText').innerText = document.querySelector('#statusText select').value;

            // 保存办理进度（时间选择器格式化）
            const progressTimes = document.querySelectorAll('[data-progress-time]');
            const progressUsers = document.querySelectorAll('[data-progress-user]');
            let idx = 0;
            progressTimes.forEach(el => {
                el.innerText = formatTimeForShow(el.querySelector('input').value);
            });
            progressUsers.forEach(el => {
                el.innerText = el.querySelector('input').value;
            });

            closeEditMode();
            alert('全部修改保存成功！');
        });

        // 取消编辑
        document.getElementById('cancelBtn').addEventListener('click', function(){
            // 恢复请假信息
            const editNodes = document.querySelectorAll('[data-edit]');
            editNodes.forEach((item, idx) => {
                item.innerText = originData[idx];
            });
            document.getElementById('statusText').innerText = '审核通过';

            // 恢复办理进度
            const progressTimes = document.querySelectorAll('[data-progress-time]');
            const progressUsers = document.querySelectorAll('[data-progress-user]');
            let idx = 0;
            progressTimes.forEach(el => {
                el.innerText = originProgress[idx++];
            });
            progressUsers.forEach(el => {
                el.innerText = originProgress[idx++];
            });

            closeEditMode();
        });

        // 关闭编辑模式
        function closeEditMode(){
            isEditMode = false;
            document.querySelector('.edit-btn-group').classList.remove('show');
        }
    </script>
</body>
</html>
